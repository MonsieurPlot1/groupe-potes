<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#7c3aed" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="G. Potes" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Groupe de Potes</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="bg-mesh" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>
  </div>

  <div class="auth-container" id="auth-box">
    <div class="auth-logo">👥</div>
    <h1>Groupe de Potes</h1>
    <p class="auth-subtitle">Ton espace privé entre amis</p>

    <div class="tabs">
      <button class="tab active" onclick="showTab('login')">Connexion</button>
      <button class="tab" onclick="showTab('register')">Inscription</button>
    </div>

    <div id="login-form">
      <input type="email" id="login-email" placeholder="Email" />
      <input type="password" id="login-password" placeholder="Mot de passe" />
      <button onclick="login()">Se connecter →</button>
    </div>

    <div id="register-form" style="display:none">
      <input type="text" id="register-username" placeholder="Pseudo" />
      <input type="email" id="register-email" placeholder="Email" />
      <input type="password" id="register-password" placeholder="Mot de passe" />
      <button onclick="register()">Créer mon compte →</button>
    </div>

    <p id="auth-message"></p>
  </div>

  <script type="module" src="js/supabase.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js')
  </script>
</body>
</html>
